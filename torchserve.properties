# TorchServe configuration file
# Reference: https://pytorch.serve.org/en/latest/configuration.html
# This file defines server-level settings like ports, worker counts, logging, etc.

# ============================================================================
# GPU CONFIGURATION
# ============================================================================
# Number of GPUs available to TorchServe
number_of_gpu=1
# TorchServe will distribute models across these GPUs

# ============================================================================
# NETWORK CONFIGURATION (API Endpoints)
# ============================================================================
# Inference API: receives POST /predictions/<model> requests from clients
inference_address=http://0.0.0.0:8080
# Listen on all network interfaces (*), port 8080
# Format: http://<bind_address>:<port>

# Management API: model registration, load/unload, status queries
management_address=http://0.0.0.0:8081
# Listen on all network interfaces (*), port 8081
# Used by sbatch script to check model readiness

# Metrics API: exposes Prometheus-format metrics
metrics_address=http://0.0.0.0:8082
# Listen on all network interfaces (*), port 8082
# Scraped by monitoring systems to collect performance data

# ============================================================================
# WORKER THREAD CONFIGURATION
# ============================================================================
# Default number of worker threads created per model on startup
default_workers_per_model=1
# Use 1 worker per model; increase for higher concurrency
# Each worker runs model inference independently

# ============================================================================
# REQUEST/RESPONSE SIZE LIMITS
# ============================================================================
# Maximum response size in bytes (6.5 MB)
max_response_size=6553500
# Prevents memory issues from returning huge responses
# Default is 6.5 MB; increase if model returns large predictions

# Maximum request size in bytes (6.5 MB)
max_request_size=6553500
# Prevents memory issues from accepting huge requests
# Protects against DDoS attacks with oversized payloads

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
# Log level for TorchServe console output
log_level=INFO
# Options: DEBUG (verbose), INFO (normal), WARNING (errors only), ERROR (critical only)

# ============================================================================
# MODEL LOADING CONFIGURATION
# ============================================================================
# Whether to load models automatically on startup
load_models_on_startup=false
# false: models specified via --models flag are loaded
# true: models listed in config file are loaded

# ============================================================================
# METRICS CONFIGURATION
# ============================================================================
# Format for metrics collection (PROMETHEUS or others)
metrics_mode=PROMETHEUS
# Prometheus format allows easy integration with monitoring stacks
# Metrics are exposed at /metrics endpoint (port 8082)

# Disable collection of system-level CPU/memory metrics
disable_system_metrics=true
# Only collect GPU metrics (via NVML) to reduce CPU overhead
# Useful for performance benchmarking where CPU metrics aren't needed

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================
# Use direct buffer allocation for zero-copy operations when available
prefer_direct_buffer=false
# false: standard Java byte buffers
# true: direct buffers (faster but uses native memory)

# Number of Netty worker threads (async I/O threads)
nanny_thread_count=32
# Handles HTTP connections and request routing
# Higher = more concurrency; tune based on CPU cores
# Rule of thumb: 2-4x number of CPU cores

# ============================================================================
# SECURITY (NOT RECOMMENDED FOR PRODUCTION)
# ============================================================================
# Token-based authentication is disabled via --disable-token-auth flag in sbatch
# WARNING: Only safe for research/internal use; NEVER use in production without auth
# Authorization checks are handled at firewall level in this research setup
