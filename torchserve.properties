inference_address=http://0.0.0.0:8080
management_address=http://0.0.0.0:8081
metrics_address=http://0.0.0.0:8082

# Single-GPU node tuning
default_workers_per_model=1
number_of_netty_threads=32
job_queue_size=1000
max_request_size=6553500
max_response_size=6553500

# Disable system metrics collection to avoid the 'nvgpu' import error spam
disable_system_metrics=true

# Where models are stored (relative to PROJECT_DIR)
model_store=./model_store
