# ============================================================================
# TorchServe configuration (RESEARCH / SINGLE-NODE)
# ============================================================================

# ----------------------------------------------------------------------------
# GPU configuration
# ----------------------------------------------------------------------------
number_of_gpu=1

# ----------------------------------------------------------------------------
# Network configuration
# ----------------------------------------------------------------------------
# Bind explicitly to loopback for single-node experiments
inference_address=http://127.0.0.1:8080
management_address=http://127.0.0.1:8081
metrics_address=http://127.0.0.1:8082

# ----------------------------------------------------------------------------
# Worker configuration
# ----------------------------------------------------------------------------
# Exactly one worker for controlled energy behavior
default_workers_per_model=1

# ----------------------------------------------------------------------------
# Request size limits
# ----------------------------------------------------------------------------
max_request_size=6553500
max_response_size=6553500

# ----------------------------------------------------------------------------
# Logging
# ----------------------------------------------------------------------------
log_level=INFO

# ----------------------------------------------------------------------------
# Model loading
# ----------------------------------------------------------------------------
load_models_on_startup=false

# ----------------------------------------------------------------------------
# Metrics
# ----------------------------------------------------------------------------
metrics_mode=PROMETHEUS
disable_system_metrics=true

# ----------------------------------------------------------------------------
# Performance tuning
# ----------------------------------------------------------------------------
prefer_direct_buffer=false
nanny_thread_count=16

# ----------------------------------------------------------------------------
# Security
# ----------------------------------------------------------------------------
# Authentication disabled via --disable-token-auth (RESEARCH ONLY)
